<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LocalDocAssistant</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>LocalDocAssistant</h1>
      <p class="sub">
        PDF·텍스트 업로드 → 요약·리포트 → 문서 범위 Q&A (localhost 전용)
      </p>
      <p class="notice">
        LLM(OpenAI 등)을 쓰면 <strong>추출된 문서 텍스트</strong>가 API로 전송됩니다. 키는 서버 환경 변수
        <code>OPENAI_API_KEY</code>로만 설정하세요. 세션·문서 목록은 이 브라우저
        <code>localStorage</code>에만 저장됩니다.
      </p>
    </header>

    <main class="layout">
      <section class="panel upload-panel">
        <h2>문서 업로드</h2>
        <label class="dropzone" id="dropzone">
          <input type="file" id="fileInput" accept=".pdf,.txt" hidden />
          <span>클릭하거나 파일을 여기에 놓으세요 (.pdf, .txt)</span>
        </label>
        <p id="uploadError" class="error" hidden></p>

        <h3>저장된 문서</h3>
        <ul id="docList" class="doc-list"></ul>
        <button type="button" id="clearAll" class="btn secondary">목록 전체 삭제</button>
      </section>

      <section class="panel content-panel" id="contentPanel" hidden>
        <div class="doc-meta">
          <span id="activeFilename"></span>
          <span id="activeKind" class="badge"></span>
        </div>

        <div class="actions">
          <button type="button" id="btnSummary" class="btn">요약·리포트 생성</button>
          <span id="summaryStatus" class="status"></span>
        </div>

        <div class="graph-layout">
          <div class="graph-wrap">
            <div id="graphRoot" class="graph-root" aria-label="문서 그래프"></div>
            <div class="graph-footer">
              <form id="qaForm" class="qa-form">
                <input type="text" id="questionInput" placeholder="문서 내용에 대해 질문하세요" autocomplete="off" />
                <button type="submit" id="qaSubmitBtn" class="btn">질문</button>
              </form>
              <span id="qaStatus" class="status"></span>
            </div>
          </div>

          <aside id="inspector" class="inspector" aria-label="선택된 노드 상세">
            <div class="ins-header">
              <div id="inspectorKind" class="badge"></div>
              <h2 id="inspectorTitle" class="ins-title">선택된 노드</h2>
            </div>
            <div id="inspectorBody" class="ins-body">그래프에서 노드를 클릭하면 내용이 표시됩니다.</div>
          </aside>
        </div>
      </section>

      <section class="panel placeholder" id="placeholder">
        <p>왼쪽에서 문서를 업로드하거나 저장된 문서를 선택하세요.</p>
      </section>
    </main>

    <script src="https://unpkg.com/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
